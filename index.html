<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Flappy 3D - Tilted</title>
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100dvh; overflow: hidden; background: #000; font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif; overscroll-behavior: none; }
        
        #game-wrapper { position: absolute; inset: 0; width: 100vw; height: 100dvh; }
        canvas { display: block; position: absolute; inset: 0; z-index: 5; }

        /* Highly performant CSS Sky Gradients */
        .sky-layer { position: absolute; inset: 0; transition: opacity 1.5s ease; opacity: 0; z-index: 1; }
        #sky-dawn { background: linear-gradient(to bottom, #8ca8d9, #ffe2e2); opacity: 1; }
        #sky-day { background: linear-gradient(to bottom, #4fa8ff, #bfe4ff); }
        #sky-sunset { background: linear-gradient(to bottom, #ff512f, #f09819); }
        #sky-night { background: linear-gradient(to bottom, #000428, #004e92); }

        /* UI Overlays */
        #ui-layer { position: absolute; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        
        #score {
            margin-top: max(40px, env(safe-area-inset-top)); font-size: 80px; font-weight: 900; color: #fff;
            -webkit-text-stroke: 3px #222; text-shadow: 0 6px 0 #222; display: none; transition: transform 0.1s;
        }
        #score.pulse { transform: scale(1.3); }

        #start-screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .title { font-size: 50px; color: #fff; -webkit-text-stroke: 2px #222; text-shadow: 0 5px 0 #222; margin-bottom: 20px; animation: float 2s infinite ease-in-out; }
        .subtitle { font-size: 20px; color: #FFD700; font-weight: bold; text-shadow: 0 2px 4px #000; text-align: center; line-height: 1.5; }

        #game-over { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; backdrop-filter: blur(2px); }
        .panel { background: #fff; padding: 40px; border-radius: 20px; border: 5px solid #222; box-shadow: 0 10px 0 #222; text-align: center; }
        .panel h1 { font-size: 40px; color: #e74c3c; margin: 0 0 10px; -webkit-text-stroke: 1px #222; text-shadow: 0 3px 0 #222; }
        .panel p { font-size: 24px; color: #333; font-weight: bold; margin: 0 0 30px; }
        
        #retry-btn {
            background: #2ecc71; color: #fff; font-size: 26px; font-weight: bold; padding: 15px 40px;
            border: 4px solid #222; border-radius: 15px; box-shadow: 0 8px 0 #27ae60;
            cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
        }
        #retry-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #27ae60; }

        #flash { position: absolute; inset: 0; background: #e74c3c; opacity: 0; z-index: 20; pointer-events: none; transition: opacity 0.1s; }

        /* Effects */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .shake { animation: shake 0.35s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 6px); } 40% { transform: translate(8px, -6px); } 60% { transform: translate(-8px, -6px); } 80% { transform: translate(8px, 6px); } }

        /* Orientation Lock */
        #landscape-lock { display: none; position: absolute; inset: 0; background: #111; color: #fff; z-index: 999; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; text-align: center; }
        @media (orientation: landscape) and (max-width: 1024px) { #landscape-lock { display: flex; } #game-wrapper { display: none; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="landscape-lock">PLEASE ROTATE TO PORTRAIT</div>

<div id="game-wrapper">
    <div id="sky-dawn" class="sky-layer"></div>
    <div id="sky-day" class="sky-layer"></div>
    <div id="sky-sunset" class="sky-layer"></div>
    <div id="sky-night" class="sky-layer"></div>
    
    <canvas id="game-canvas"></canvas>
    <div id="flash"></div>

    <div id="ui-layer">
        <div id="score">0</div>
        <div id="start-screen">
            <div class="title">FLAPPY 3D</div>
            <div class="subtitle">TAP to Flap<br>HOLD to Flutter<br>RELEASE to Dive</div>
        </div>
        <div id="game-over">
            <div class="panel">
                <h1>GAME OVER</h1>
                <p>SCORE: <span id="final-score">0</span></p>
                <button id="retry-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * FLAPPY 3D - TILT PERSPECTIVE
 * Engine: pure Three.js r128
 */

// --- CONFIGURATION ---
const CONFIG = {
    gravityDive: 48,
    gravityFlutter: 16,
    flapVelocity: 14.5,
    pipeSpeed: 22,
    pipeGap: 4.5,
    pipeSpawnZ: -100,
    pipeSpacing: 35
};

let scene, camera, renderer, clock;
let bird, wingL, wingR, eyeL, eyeR;
let pipes = [], groundTex, mountains = [], clouds = [], stars;
let feathers = [], sparkles = [];

let state = 'START'; // START, PLAYING, DEAD
let score = 0, currentPhase = 0;
let isHolding = false, velocityY = 0, eyeTimer = 0;

// Palettes & Lighting Targets (To Lerp against CSS sky)
const PHASES = [
    { id: 'sky-dawn', fog: 0xffe2e2, dir: 0xffdddd, hemi: 0xffffff, stars: 0 },
    { id: 'sky-day', fog: 0xbfe4ff, dir: 0xffffff, hemi: 0xddddff, stars: 0 },
    { id: 'sky-sunset', fog: 0xf09819, dir: 0xffaa55, hemi: 0xffddaa, stars: 0 },
    { id: 'sky-night', fog: 0x004e92, dir: 0x6666ff, hemi: 0x222244, stars: 1 }
];
let targetFog = new THREE.Color(PHASES[0].fog);
let targetDir = new THREE.Color(PHASES[0].dir);
let targetHemi = new THREE.Color(PHASES[0].hemi);
let targetStars = 0;

let dirLight, hemiLight;

function init() {
    // Renderer
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), alpha: true, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(PHASES[0].fog, 20, 80);
    clock = new THREE.Clock();

    // 3/4 Tilted Mario Kart Perspective (Bird faces -Z, camera is behind & right)
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 120);
    camera.position.set(4, 2.5, 6);
    camera.lookAt(1, 0, -5);

    setupLighting();
    setupBird();
    setupPipes();
    setupEnvironment();
    setupParticles();

    // Inputs
    const handleDown = (e) => {
        if(e.target.id === 'retry-btn') return;
        if(e.cancelable) e.preventDefault();
        isHolding = true;

        if (state === 'START') {
            state = 'PLAYING';
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('score').style.display = 'block';
            flap();
        } else if (state === 'PLAYING') {
            flap();
        }
    };
    
    window.addEventListener('pointerdown', handleDown, { passive: false });
    window.addEventListener('pointerup', () => isHolding = false);
    window.addEventListener('pointercancel', () => isHolding = false);
    document.addEventListener('touchstart', (e) => { if (e.target.id !== 'retry-btn' && e.cancelable) e.preventDefault(); }, { passive: false });

    document.getElementById('retry-btn').addEventListener('pointerdown', (e) => { e.stopPropagation(); resetGame(); });
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(animate);
}

function setupLighting() {
    hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    scene.add(hemiLight);

    dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.camera.left = -15; dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15; dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.1; dirLight.shadow.camera.far = 50;
    scene.add(dirLight);
}

function setupBird() {
    bird = new THREE.Group();

    // Body (Strictly 8 Triangles)
    const body = new THREE.Mesh(new THREE.OctahedronGeometry(0.4, 0), new THREE.MeshPhongMaterial({ color: 0xffcc00, flatShading: true }));
    body.castShadow = true; bird.add(body);

    // Wings (Strictly 2 Triangles each)
    const wingGeo = new THREE.PlaneGeometry(0.3, 0.2);
    const wingMat = new THREE.MeshPhongMaterial({ color: 0xff9900, side: THREE.DoubleSide, flatShading: true });
    wingL = new THREE.Mesh(wingGeo, wingMat); wingL.position.set(-0.4, 0, 0);
    wingR = new THREE.Mesh(wingGeo, wingMat); wingR.position.set(0.4, 0, 0);
    bird.add(wingL, wingR);

    // Beak (Custom BufferGeometry: Strictly 2 Triangles Wedge)
    const beakGeo = new THREE.BufferGeometry();
    beakGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        0, 0.08, 0,       // top
        -0.12, -0.06, 0,  // left
        0.12, -0.06, 0,   // right
        0, 0, -0.25       // tip (pointing into Z screen)
    ]), 3));
    beakGeo.setIndex([0, 1, 3,  0, 3, 2]);
    beakGeo.computeVertexNormals();
    const beak = new THREE.Mesh(beakGeo, new THREE.MeshPhongMaterial({ color: 0xff4500, flatShading: true }));
    beak.castShadow = true; bird.add(beak);

    // Eyes
    const createEye = (xDir) => {
        const grp = new THREE.Group();
        const base = new THREE.Mesh(new THREE.CircleGeometry(0.08, 12), new THREE.MeshBasicMaterial({ color: 0x111 }));
        const hl = new THREE.Mesh(new THREE.CircleGeometry(0.025, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        hl.position.set(0.02, 0.02, 0.01);
        grp.add(base, hl);
        grp.position.set(xDir, 0.15, -0.3);
        grp.rotation.y = xDir > 0 ? Math.PI/6 : -Math.PI/6;
        return grp;
    };
    eyeL = createEye(-0.2); eyeR = createEye(0.2);
    bird.add(eyeL, eyeR);

    scene.add(bird);
}

function setupPipes() {
    const pipeMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71, flatShading: true });
    const capMat = new THREE.MeshPhongMaterial({ color: 0x27ae60, flatShading: true });

    const createHalf = (isTop) => {
        const grp = new THREE.Group();
        // Dome Cap
        const dome = new THREE.Mesh(new THREE.SphereGeometry(1.3, 16, 8, 0, Math.PI*2, 0, Math.PI/2), capMat);
        dome.position.y = isTop ? 1.3 : -1.3; if(isTop) dome.rotation.x = Math.PI; dome.castShadow = true; grp.add(dome);
        // Cylinder Rim
        const rim = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 1, 16), capMat);
        rim.position.y = isTop ? 1.8 : -1.8; rim.castShadow = true; grp.add(rim);
        // Shaft
        const shaft = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 30, 16), pipeMat);
        shaft.position.y = isTop ? 17.3 : -17.3; shaft.castShadow = true; grp.add(shaft);
        return grp;
    };

    for(let i = 0; i < 5; i++) {
        const pair = new THREE.Group();
        const top = createHalf(true); const bot = createHalf(false);
        pair.add(top, bot);
        pair.userData = { passed: false, topY: 0, botY: 0 };
        scene.add(pair); pipes.push(pair);
    }
    
    pipes.forEach((p, i) => resetPipe(p, CONFIG.pipeSpawnZ + (i * CONFIG.pipeSpacing)));
}

function resetPipe(p, zPos) {
    p.position.z = zPos;
    const centerY = -2 + Math.random() * 6; // Range -2 to 4
    p.children[0].position.y = centerY + (CONFIG.pipeGap / 2);
    p.children[1].position.y = centerY - (CONFIG.pipeGap / 2);
    p.userData.topY = centerY + (CONFIG.pipeGap / 2);
    p.userData.botY = centerY - (CONFIG.pipeGap / 2);
    p.userData.passed = false;
}

function setupEnvironment() {
    // Generative ground texture
    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#7cb342'; ctx.fillRect(0,0,256,256);
    ctx.fillStyle = '#689f38'; for(let i=0; i<256; i+=64) ctx.fillRect(0, i, 256, 32);
    groundTex = new THREE.CanvasTexture(canvas);
    groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping; groundTex.repeat.set(20, 200);
    
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 3000), new THREE.MeshPhongMaterial({ map: groundTex }));
    ground.rotation.x = -Math.PI / 2; ground.position.y = -6; ground.receiveShadow = true;
    scene.add(ground);

    // Parallax Mountains
    const mMat = new THREE.MeshPhongMaterial({ color: 0x3d5a40, flatShading: true });
    for(let i=0; i<15; i++) {
        const m = new THREE.Mesh(new THREE.ConeGeometry(8, 25, 5), mMat);
        m.position.set((Math.random()-0.5)*150, -2, -30 - Math.random()*120);
        scene.add(m); mountains.push(m);
    }

    // Parallax Clouds
    const cMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.8, flatShading: true });
    for(let i=0; i<20; i++) {
        const c = new THREE.Mesh(new THREE.DodecahedronGeometry(3 + Math.random()*2, 0), cMat);
        c.position.set((Math.random()-0.5)*150, 15 + Math.random()*10, -30 - Math.random()*120);
        scene.add(c); clouds.push(c);
    }

    // Stars
    const sGeo = new THREE.BufferGeometry(); const sVerts = [];
    for(let i=0; i<200; i++) sVerts.push((Math.random()-0.5)*200, 10 + Math.random()*50, -20 - Math.random()*150);
    sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sVerts, 3));
    stars = new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0 }));
    scene.add(stars);
}

function setupParticles() {
    // Object Pool Pattern
    for(let i=0; i<25; i++) {
        const f = new THREE.Mesh(new THREE.TetrahedronGeometry(0.18), new THREE.MeshPhongMaterial({ color: 0xffd700 }));
        f.visible = false; scene.add(f); feathers.push({ m: f, v: new THREE.Vector3() });
    }
    for(let i=0; i<15; i++) {
        const s = new THREE.Mesh(new THREE.OctahedronGeometry(0.15, 0), new THREE.MeshBasicMaterial({ color: 0xffffff }));
        s.visible = false; scene.add(s); sparkles.push({ m: s, v: new THREE.Vector3(), life: 0 });
    }
}

// --- LOGIC ---
function flap() {
    velocityY = CONFIG.flapVelocity;
    eyeTimer = 0.15; // Squint eyes
}

function triggerSparkles(z, topY, botY) {
    const centerY = (topY + botY) / 2;
    let count = 0;
    sparkles.forEach(s => {
        if (s.life <= 0 && count < 6) {
            s.m.position.set(0, centerY + (Math.random()-0.5)*2, z);
            s.m.visible = true; s.life = 1.0;
            s.v.set((Math.random()-0.5)*6, (Math.random()-0.5)*6, (Math.random()-0.5)*6);
            count++;
        }
    });
}

function updatePhase() {
    const targetIdx = Math.floor(score / 5) % PHASES.length;
    if (targetIdx !== currentPhase) {
        currentPhase = targetIdx;
        const p = PHASES[currentPhase];
        
        // CSS Crossfade
        document.querySelectorAll('.sky-layer').forEach(el => el.style.opacity = (el.id === p.id) ? '1' : '0');
        
        // Target Three.js Lerps
        targetFog.setHex(p.fog);
        targetDir.setHex(p.dir);
        targetHemi.setHex(p.hemi);
        targetStars = p.stars;
    }
}

function die() {
    if(state === 'DEAD') return;
    state = 'DEAD';
    
    // FX
    document.getElementById('game-wrapper').classList.add('shake');
    setTimeout(() => document.getElementById('game-wrapper').classList.remove('shake'), 350);
    const flash = document.getElementById('flash');
    flash.style.opacity = '0.8'; setTimeout(() => flash.style.opacity = '0', 100);
    
    // Feather Burst
    feathers.forEach(f => {
        f.m.position.copy(bird.position); f.m.visible = true;
        f.v.set((Math.random()-0.5)*18, Math.random()*12 + 4, (Math.random()-0.5)*18);
    });
    bird.visible = false;
    
    setTimeout(() => {
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over').style.display = 'flex';
    }, 1000);
}

function resetGame() {
    state = 'START'; score = 0; velocityY = 0; currentPhase = 0;
    document.getElementById('score').innerText = '0';
    document.getElementById('score').style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    
    bird.position.set(0, 0, 0); bird.rotation.set(0, 0, 0); bird.visible = true;
    pipes.forEach((p, i) => resetPipe(p, CONFIG.pipeSpawnZ + i * CONFIG.pipeSpacing));
    feathers.forEach(f => f.m.visible = false); sparkles.forEach(s => s.m.visible = false);
    
    updatePhase(); // Force back to Dawn
}

// --- GAME LOOP ---
function animate() {
    const dt = Math.min(clock.getDelta(), 0.05);
    const time = clock.getElapsedTime();

    // Lerp environment lighting to match CSS Sky
    scene.fog.color.lerp(targetFog, dt * 1.5);
    dirLight.color.lerp(targetDir, dt * 1.5);
    hemiLight.groundColor.lerp(targetHemi, dt * 1.5);
    stars.material.opacity = THREE.MathUtils.lerp(stars.material.opacity, targetStars, dt * 1.5);

    if (state === 'START') {
        bird.position.y = Math.sin(time * 5) * 0.5;
        wingL.rotation.z = Math.sin(time * 12) * 0.2;
        wingR.rotation.z = -Math.sin(time * 12) * 0.2;
    } 
    else if (state === 'PLAYING' || state === 'DEAD') {
        const activeGravity = (isHolding && velocityY < 0 && state === 'PLAYING') ? CONFIG.gravityFlutter : CONFIG.gravityDive;
        velocityY -= activeGravity * dt;
        bird.position.y += velocityY * dt;

        if (state === 'PLAYING') {
            // Velocity Tilting
            bird.rotation.x = THREE.MathUtils.lerp(bird.rotation.x, Math.max(-Math.PI/4, Math.min(Math.PI/4, velocityY * 0.05)), dt * 12);
            
            // Wing animations based on velocity
            if (velocityY > 0) {
                wingL.rotation.z = -0.6; wingR.rotation.z = 0.6;
            } else {
                wingL.rotation.z = THREE.MathUtils.lerp(wingL.rotation.z, 0.2, dt * 10);
                wingR.rotation.z = THREE.MathUtils.lerp(wingR.rotation.z, -0.2, dt * 10);
            }

            // Squint Logic
            if (eyeTimer > 0) { eyeTimer -= dt; eyeL.scale.y = eyeR.scale.y = 0.1; } 
            else { eyeL.scale.y = eyeR.scale.y = 1; }

            // Ceiling & Floor Collision
            if (bird.position.y < -5.5 || bird.position.y > 12) die();

            // Pipes Movement & Collision
            pipes.forEach(p => {
                p.position.z += CONFIG.pipeSpeed * dt;
                
                // Collision Hitbox
                if (Math.abs(p.position.z) < 1.6) {
                    if (bird.position.y + 0.35 > p.userData.topY || bird.position.y - 0.35 < p.userData.botY) die();
                }
                
                // Score Increment
                if (!p.userData.passed && p.position.z > 0) {
                    p.userData.passed = true;
                    score++;
                    
                    const scoreEl = document.getElementById('score');
                    scoreEl.innerText = score;
                    scoreEl.classList.remove('pulse'); void scoreEl.offsetWidth; scoreEl.classList.add('pulse');
                    
                    triggerSparkles(p.position.z, p.userData.topY, p.userData.botY);
                    updatePhase();
                }
                
                // Recycle Pipe
                if (p.position.z > 15) {
                    let minZ = Math.min(...pipes.map(x => x.position.z));
                    resetPipe(p, minZ - CONFIG.pipeSpacing);
                }
            });

            // Parallax Movement (Texture wrapping offset trick)
            groundTex.offset.y -= CONFIG.pipeSpeed * 0.05 * dt;
            mountains.forEach(m => { m.position.z += CONFIG.pipeSpeed * 0.4 * dt; if(m.position.z > 20) m.position.z -= 150; });
            clouds.forEach(c => { c.position.z += CONFIG.pipeSpeed * 0.2 * dt; if(c.position.z > 20) { c.position.z -= 150; c.position.x = (Math.random()-0.5)*150; } });

        } else {
            // Death tumble
            bird.rotation.x += dt * 5; bird.rotation.y += dt * 5;
        }
    }

    // Particle Physics
    feathers.forEach(p => {
        if (p.m.visible) {
            p.v.y -= CONFIG.gravityDive * dt;
            p.m.position.addScaledVector(p.v, dt);
            p.m.rotation.x += dt * 8; p.m.rotation.y += dt * 8;
            if (p.m.position.y < -10) p.m.visible = false;
        }
    });
    sparkles.forEach(s => {
        if (s.life > 0) {
            s.life -= dt * 2.5;
            s.m.position.addScaledVector(s.v, dt);
            s.m.rotation.z += dt * 5;
            const scale = Math.max(0, s.life); s.m.scale.setScalar(scale);
            if (s.life <= 0) s.m.visible = false;
        }
    });

    renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
